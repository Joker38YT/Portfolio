<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio – Quentin Boussaguet</title>

  <link rel="stylesheet" href="./css/common.css" />

  
</head>

<body>

  <header class="arcade-top">
    <span class="arcade-title">QUENTIN BOUSSAGUET</span>
  </header>

  <aside class="arcade-side arcade-side-left"></aside>
  <aside class="arcade-side arcade-side-right"></aside>

  <main class="arcade-screen">
    <div class="arcade-content">
     


  </main>

  <footer class="arcade-panel">

    <div class="joy-wrap">
      <div class="joy-stick">
        <div class="joy-ball ball-blue"></div>
      </div>
      <div class="joy-plate"></div>
    </div>

    <div class="btn-zone">
      <div class="btn-row">
        <div class="abtn abtn-lg abtn-b"></div>
        <div class="abtn abtn-lg abtn-b"></div>
        <div class="abtn abtn-lg abtn-b"></div>
      </div>
      <div class="btn-row">
        <div class="abtn abtn-sm abtn-b"></div>
        <div class="abtn abtn-sm abtn-b"></div>
        <div class="abtn abtn-sm abtn-b"></div>
      </div>
    </div>

    <div class="panel-center">
      <div class="panel-score">1UP &nbsp;·&nbsp; HI &nbsp;·&nbsp; 2UP<br />00 &nbsp; 00000 &nbsp; 00</div>
      <div class="panel-blink">INSERT COIN</div>
      <div class="coin-slot"></div>
    </div>

    <div class="btn-zone">
      <div class="btn-row">
        <div class="abtn abtn-lg abtn-r"></div>
        <div class="abtn abtn-lg abtn-r"></div>
        <div class="abtn abtn-lg abtn-r"></div>
      </div>
      <div class="btn-row">
        <div class="abtn abtn-sm abtn-r"></div>
        <div class="abtn abtn-sm abtn-r"></div>
        <div class="abtn abtn-sm abtn-r"></div>
      </div>
    </div>

    <div class="joy-wrap">
      <div class="joy-stick">
        <div class="joy-ball ball-red"></div>
      </div>
      <div class="joy-plate"></div>
    </div>

  </footer>

</body>

</html>
